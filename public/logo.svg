<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vault-grad-premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2CA58D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E92CC;stop-opacity:1" />
    </linearGradient>
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#premium-glow)">
    <!-- Outer Chassis -->
    <path d="M120 70 V160 H100 V200 H120 V312 H100 V352 H120 V442 H300 C400 442 480 362 480 256 C480 150 400 70 300 70 H120 Z" 
          stroke="url(#vault-grad-premium)" stroke-width="20" stroke-linejoin="round" fill="none" />
    
    <!-- Central Hub -->
    <circle cx="280" cy="256" r="75" stroke="url(#vault-grad-premium)" stroke-width="15" />
    <circle cx="280" cy="256" r="30" fill="url(#vault-grad-premium)" />
    
    <!-- Side Arms -->
    <path d="M205 256 H120 M335 200 L390 145 M335 312 L390 367" 
          stroke="url(#vault-grad-premium)" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>